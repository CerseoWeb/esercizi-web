<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Esercizi DOM</title>
    <style>
        /* RESET & BASE */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CONTENITORE PRINCIPALE */
        .hub-container {
            background: white;
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
            font-size: 2.5rem;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        /* LISTA CARD */
        .exercise-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* CARD ESERCIZIO */
        .card {
            display: flex;
            align-items: center;
            text-decoration: none;
            background: #fff;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #007bff;
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.1);
        }

        /* ICONA E TESTI */
        .icon {
            font-size: 2rem;
            margin-right: 20px;
            width: 40px;
            text-align: center;
        }

        .info {
            flex: 1;
        }

        .info h3 {
            margin: 0 0 5px 0;
            color: #2c3e50;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }

        .info p {
            margin: 0;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        /* TAG DIFFICOLTA' */
        .badge {
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 10px;
        }

        .tutorial {
            background-color: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
        }

        /* Blu */
        .easy {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        /* Verde */
        .medium {
            background-color: #fff3e0;
            color: #ef6c00;
        }

        /* Arancione */
        .hard {
            background-color: #ffebee;
            color: #c62828;
        }

        /* Rosso */

        /* FRECCIA AL PASSAGGIO DEL MOUSE */
        .arrow {
            font-size: 1.5rem;
            color: #ddd;
            transition: 0.3s;
        }

        .card:hover .arrow {
            color: #007bff;
            transform: translateX(5px);
        }
    </style>
</head>

<body>

    <div class="hub-container">
        <h1>Esercizi DOM</h1>
        <p class="subtitle">Corso Web Developer</p>

        <div class="exercise-list">

            <a href="tutorial/index.html" class="card">
                <div class="icon">🧪</div>
                <div class="info">
                    <h3>Tutorial<span class="badge tutorial">Tutorial</span></h3>
                    <p>Impara a pulire stringhe, gestire numeri e filtrare array.</p>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="calcolatrice/index.html" class="card">
                <div class="icon">🧮</div>
                <div class="info">
                    <h3>Calcolatrice <span class="badge medium">Logica</span></h3>
                    <p>Validazione input, Parsing numeri, Switch case.</p>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="generatore_utenti/index.html" class="card">
                <div class="icon">👤</div>
                <div class="info">
                    <h3>Generatore Utenti<span class="badge medium">Stringhe</span></h3>
                    <p>Manipolazione stringhe, generazione numeri casuali.</p>
                </div>
                <div class="arrow">→</div>
            </a>

        </div>
    </div>

</body>

</html>
